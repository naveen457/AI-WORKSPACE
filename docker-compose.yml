services:
  frontend:
    image: naveenchowdary577/astrix-frontend:1.3
    build:
      context: ./client
      args:
        VITE_API_URL: https://astrix-backend-1-0.onrender.com
    ports:
      - "5173:5173"
    environment:
      PORT: 5173

  backend:
    image: naveenchowdary577/astrix-backend:1.3
    build:
      context: ./server
    ports:
      - "5000:5000"

    env_file:
      - ./server/.env
